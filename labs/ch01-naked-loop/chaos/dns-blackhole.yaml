# Ch1 chaos: a NetworkPolicy that silently eats DNS for the checkout service.
# Symptom: checkout fails. Cause: two hops away, in a netpol nobody remembers applying.
# This is a faithful reproduction of a classic real-world incident class.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: checkout-egress-lockdown
  namespace: shop
  labels:
    srebudo.ai/chaos: ch01
  annotations:
    note: "applied during a 'security hardening sprint', forgot UDP 53. classic."
spec:
  podSelector:
    matchLabels:
      app: checkoutservice
  policyTypes: ["Egress"]
  egress:
    # allows egress to other shop pods on TCP… but no DNS (UDP/TCP 53 to kube-system). oops.
    - to:
        - podSelector: {}
      ports:
        - { protocol: TCP, port: 5050 }
        - { protocol: TCP, port: 7000 }
        - { protocol: TCP, port: 7070 }
        - { protocol: TCP, port: 8080 }
        - { protocol: TCP, port: 50051 }
